services:
  # ─── PostgreSQL ───
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sky_style
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Ждём готовности БД, чтобы Rust не упал при старте
      test: ["CMD-SHELL", "pg_isready -U postgres -d sky_style"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Rust-микросервис (бэкенд, работа с БД) ───
  rust-service:
    build: ./rust-service
    depends_on:
      postgres:
        condition: service_healthy   # запускаем только когда БД готова
    environment:
      # Внутри сети Docker хост — это имя сервиса "postgres"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sky_style
      RUST_LOG: info
    ports:
      - "8080:8080"

  # ─── Python/Flask (шлюз, фронтенд) ───
  python-service:
    build: ./python-service
    depends_on:
      - rust-service
    environment:
      # Внутри сети Docker хост — это имя сервиса "rust-service"
      RUST_SERVICE_URL: http://rust-service:8080
    ports:
      - "8000:8000"

volumes:
  pgdata:
