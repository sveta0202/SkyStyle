services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sky_style
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sky_style"]
      interval: 5s
      timeout: 5s
      retries: 10

  rust-service:
    build: ./rust-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sky_style
      RUST_LOG: ${RUST_LOG:-info}
      WEATHER_API_KEY: ${WEATHER_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_KEY: ${LLM_KEY}
      LLM_MODEL: ${LLM_MODEL}
      IMAGE_BASE_URL: ${IMAGE_BASE_URL}
      IMAGE_API_KEY: ${IMAGE_API_KEY}
      IMAGE_MODEL: ${IMAGE_MODEL}
    ports:
      - "8080:8080"

  python-service:
    build: ./python-service
    depends_on:
      - rust-service
    environment:
      RUST_SERVICE_URL: http://rust-service:8080
    ports:
      - "8000:8000"

volumes:
  pgdata: