<!DOCTYPE html>
<html lang="ru">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Регистрация</title>
     <link rel="stylesheet" href="{{ url_for('static', filename='styles/registr.css') }}">
</head>
<body>
     <header class="logo">
          <img src="{{ url_for('static', filename='images/logo.png') }}" class="logoImage" alt="SkyStyle logo">
          <span>SkyStyle</span>
     </header>

     <div class="main">
          <h3 class="title">Регистрация</h3>

          <div class="field-group">
               <input id="user_name" type="text" placeholder="ваше имя">
          </div>

          <div class="field-group">
               <input id="email" type="email" placeholder="email">
          </div>

          <div class="field-group">
               <input id="password" type="password" placeholder="введите пароль">
          </div>

          <div class="field-group">
               <input id="password2" type="password" placeholder="повторите пароль">
          </div>

          <label class="checkbox">
               <input id="agree" type="checkbox">
               <span> Я принимаю условия</span>
          </label>

          <button class="registrButton" onclick="sendForm()">зарегистрироваться</button>

          <div class="login">
               <p>Уже есть аккаунт? <a href="{{ url_for('auth') }}">Войти</a></p>
          </div>
     </div>

     <script>
        async function sendForm() {
            const user_name = document.getElementById("user_name").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const password2 = document.getElementById("password2").value;
            const agree = document.getElementById("agree").checked;

            if (!agree) {
                alert("Примите условия");
                return;
            }
            if (password !== password2) {
                alert("Пароли не совпадают");
                return;
            }

            try {
                const r = await fetch("/collect-registration", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        registration: { user_name, email, password }
                    })
                });
                const data = await r.json();
                if (data.ok) {
                    localStorage.setItem("user_id", data.user.id);
                    localStorage.setItem("user_email", data.user.email);
                    alert("Зарегистрировано: " + data.user.user_name);
                    window.location.href = "/auth";
                } else {
                    alert("Ошибка: " + data.error);
                }
            } catch (e) {
                alert("Сетевая ошибка: " + e);
            }
        }
     </script>
</body>
</html>
