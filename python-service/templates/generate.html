<!DOCTYPE html>
<html lang="ru">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Создать образ | Sky Style</title>
     <link rel="stylesheet" href="{{ url_for('static', filename='styles/generate.css') }}">
</head>
<body>

<header class="header">
     <a href="{{ url_for('home') }}" class="logo">
          <div class="logo-icon">S</div>
          <span>Sky<span>Style</span></span>
     </a>

     <nav class="nav">
          <a href="{{ url_for('home') }}">главная</a>
          <a href="{{ url_for('profile') }}">профиль</a>
          <a href="{{ url_for('outfits_page') }}">мои образы</a>
          <a href="{{ url_for('generate') }}" class="active">создать образ</a>
     </nav>
</header>

<main class="page">
     <section class="generator-panel">
          <p class="eyebrow">новый лук</p>
          <h1>Создать образ</h1>

          <div class="choice-block">
               <h2>Цель аутфита</h2>
               <div class="choice-grid" id="goalButtons">
                    <button type="button" class="choice-btn active" data-value="праздник">на праздник</button>
                    <button type="button" class="choice-btn" data-value="улица">на улицу</button>
                    <button type="button" class="choice-btn" data-value="дом">домашний</button>
                    <button type="button" class="choice-btn" data-value="учеба">на учебу</button>
                    <button type="button" class="choice-btn" data-value="офис">в офис</button>
                    <button type="button" class="choice-btn" data-value="театр">в театр</button>
               </div>
          </div>

          <div class="choice-block">
               <h2>Тона</h2>
               <div class="choice-grid" id="toneButtons">
                    <button type="button" class="choice-btn active" data-value="теплые">теплые</button>
                    <button type="button" class="choice-btn" data-value="холодные">холодные</button>
                    <button type="button" class="choice-btn" data-value="яркие">яркие</button>
                    <button type="button" class="choice-btn" data-value="смешанные">смешанные</button>
               </div>
          </div>

          <button type="button" class="generate-btn" id="generateBtn">сгенерировать образы</button>
     </section>

     <section class="result-panel">
          <div class="result-header">
               <div>
                    <p class="eyebrow">результат</p>
               </div>
               <span class="weather-pill" id="statusPill">готов к генерации</span>
          </div>

          <div class="result-grid" id="resultGrid">
               <div class="empty-result">
                    <div class="empty-icon">✨</div>
                    <h3>Пока образ не создан</h3>
                    <p>Выберите цель и тона, затем нажмите кнопку генерации.</p>
               </div>
          </div>
     </section>
</main>

<script>
     let selectedGoal = "праздник";
     let selectedTone = "теплые";

     function setupToggle(groupId, onChange) {
          const group = document.getElementById(groupId);
          const buttons = group.querySelectorAll(".choice-btn");

          buttons.forEach((button) => {
               button.addEventListener("click", () => {
                    buttons.forEach((btn) => btn.classList.remove("active"));
                    button.classList.add("active");
                    onChange(button.dataset.value);
               });
          });
     }

     setupToggle("goalButtons", (value) => selectedGoal = value);
     setupToggle("toneButtons", (value) => selectedTone = value);

     document.getElementById("generateBtn").addEventListener("click", async () => {
          const resultGrid = document.getElementById("resultGrid");
          const statusPill = document.getElementById("statusPill");

          const userId = localStorage.getItem("user_id");
          const city = localStorage.getItem("city") || "Innopolis";

          if (!userId) {
               statusPill.textContent = "ошибка";
               resultGrid.innerHTML = `
                    <div class="empty-result">
                         <div class="empty-icon">⚠️</div>
                         <h3>Пользователь не найден</h3>
                         <p>Сначала войдите в аккаунт.</p>
                    </div>
               `;
               return;
          }

          statusPill.textContent = "генерация...";
          resultGrid.innerHTML = `
               <div class="empty-result">
                    <div class="empty-icon">⏳</div>
                    <h3>Создаем образ</h3>
                    <p>Учитываем гардероб, погоду и выбранные параметры.</p>
               </div>
          `;

          try {
               const response = await fetch("/generate-outfit", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                         user_id: userId,
                         city,
                         goal: selectedGoal,
                         tone: selectedTone
                    })
               });

               const contentType = response.headers.get("content-type") || "";
               const rawText = await response.text();

               if (!contentType.includes("application/json")) {
                    console.error("Не JSON-ответ:", rawText);
                    throw new Error("Сервер вернул HTML вместо JSON");
               }

               const data = JSON.parse(rawText);

               if (!response.ok || data.ok === false) {
                    throw new Error(data.error || "Ошибка генерации");
               }

               const itemsHtml = (data.items || [])
                    .map(item => `<li>${item}</li>`)
                    .join("");

               const imageHtml = data.image_base64
                    ? `<div style="border-radius:24px; overflow:hidden; margin-bottom:18px;">
                           <img src="data:image/png;base64,${data.image_base64}" alt="Сгенерированный образ" style="width:100%; display:block;">
                       </div>`
                    : "";

               statusPill.textContent =
                    `${Math.round(data.weather?.temp ?? 0)}° · ${data.weather?.description || "без данных"}`;

               resultGrid.innerHTML = `
                    <article class="outfit-result" style="grid-column: 1 / -1;">
                         <div class="result-top">
                              <span class="result-tag">${selectedTone}</span>
                              <span class="save-mark">★</span>
                         </div>

                         <h3>${data.title || "Новый образ"}</h3>
                         ${imageHtml}

                         <ul class="outfit-list">
                              ${itemsHtml || "<li>Нет списка вещей</li>"}
                         </ul>

                         ${data.note ? `
                              <p style="margin-top:16px; color:#637399; font-size:18px; line-height:1.55;">
                                   ${data.note}
                              </p>
                         ` : ""}

                         <div style="margin-top:22px; padding:18px; border-radius:22px; background: rgba(234,241,255,.85);">
                              <strong style="display:block; margin-bottom:8px;">Погода</strong>
                              <div style="color:#4C5E8A; line-height:1.6;">
                                   Город: ${data.weather?.city || city}<br>
                                   Температура: ${data.weather?.temp ?? "—"}°C<br>
                                   Ощущается как: ${data.weather?.feels_like ?? "—"}°C<br>
                                   Условия: ${data.weather?.description || "—"}<br>
                                   Влажность: ${data.weather?.humidity ?? "—"}%<br>
                                   Ветер: ${data.weather?.wind ?? "—"} м/с
                              </div>
                         </div>

                         <div style="margin-top:18px; padding:18px; border-radius:22px; background: rgba(255,255,255,.7); border:1px solid rgba(139,184,255,.34);">
                              <strong style="display:block; margin-bottom:8px;">Учтённый гардероб</strong>
                              <div style="color:#4C5E8A; line-height:1.6;">
                                   ${(data.wardrobe || []).length ? data.wardrobe.join(", ") : "Гардероб пока пуст"}
                              </div>
                         </div>
                    </article>
               `;
          } catch (error) {
               statusPill.textContent = "ошибка";
               resultGrid.innerHTML = `
                    <div class="empty-result">
                         <div class="empty-icon">⚠️</div>
                         <h3>Не удалось сгенерировать образ</h3>
                         <p>${error.message}</p>
                    </div>
               `;
          }
     });
</script>

</body>
</html>
