<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/login.css') }}">
</head>
<body>
    <header class="logo">
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logoImage" alt="SkyStyle logo">
        <span>SkyStyle</span>
    </header>

    <div class="main">
        <h3 class="title">вход в аккаунт</h3>

        <div class="field-group">
            <input id="user_name" type="text" placeholder="ваше имя">
        </div>

        <div class="field-group">
            <input id="email" type="email" placeholder="email">
        </div>

        <div class="field-group">
            <input id="password" type="password" placeholder="введите пароль">
        </div>

        <button class="loginButton" onclick="sendForm()">войти</button>
    </div>

    <script>
        async function sendForm() {
            const user_name = document.getElementById("user_name").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            try {
                const r = await fetch("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_name, email, password })
                });
                const data = await r.json();
                if (data.ok) {
                    window.location.href = "/";
                } else {
                    alert("Ошибка входа: " + data.error);
                }
            } catch (e) {
                alert("Сетевая ошибка: " + e);
            }
        }
    </script>
</body>
</html>
